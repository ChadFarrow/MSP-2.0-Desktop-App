name: 'Build & Release'

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '*.md'
      - 'example-feed.xml'
      - '.github/workflows/sync-upstream.yml'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump_version.outputs.version }}
      tag_name: ${{ steps.bump_version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: bump_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Use the tag name directly (manual release)
            TAG_NAME="${{ github.ref_name }}"
            VERSION="${TAG_NAME#v}"
          else
            # Use base version + run number for auto-incrementing builds
            BASE_VERSION=$(grep '"version"' src-tauri/tauri.conf.json | sed 's/.*"\([0-9]*\.[0-9]*\)\.[0-9]*".*/\1/')
            VERSION="${BASE_VERSION}.${{ github.run_number }}"
            TAG_NAME="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Tag: $TAG_NAME"

  build-tauri:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          cat src-tauri/tauri.conf.json | grep version

      - name: Set signing key
        shell: bash
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY=$(echo '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag_name }}
          releaseName: 'MSP Studio ${{ needs.prepare.outputs.tag_name }}'
          releaseBody: |
            ## MSP Studio Desktop Release

            ### Downloads
            | OS | File | Notes |
            |----|------|-------|
            | **Windows** | `.msi` | Recommended |
            | **Windows** | `.exe` | Alternative installer |
            | **macOS (Apple Silicon)** | `_aarch64.dmg` | M1/M2/M3/M4 |
            | **macOS (Intel)** | `_x64.dmg` | |
            | **Linux (Debian/Ubuntu)** | `.deb` | `sudo dpkg -i <file>` |
            | **Linux (Fedora/RHEL)** | `.rpm` | |
            | **Linux (Universal)** | `.AppImage` | Works on any distro |

            > The `.sig`, `.tar.gz`, and `latest.json` files are for auto-updates — you can ignore them.

            ### macOS Users
            This app is not signed with an Apple Developer certificate. To open it:
            1. **Right-click** (or Control-click) the app
            2. Select **Open** from the menu
            3. Click **Open** in the dialog that appears

            Or run this in Terminal after mounting the DMG:
            ```bash
            xattr -cr /Applications/MSP\ Studio.app
            ```

            ### Linux Users
            You may need to install webkit2gtk:
            ```bash
            sudo apt install libwebkit2gtk-4.1-0
            ```
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  upload-updater-json:
    needs: [prepare, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag_name }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO="ChadFarrow/MSP-2.0-Desktop-App"

          # Wait for all assets to be available
          sleep 5

          # Get release info
          RELEASE_JSON=$(gh api repos/$REPO/releases/tags/$TAG)
          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body')
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          DOWNLOAD_BASE="https://github.com/$REPO/releases/download/$TAG"

          # Download all .sig files
          TMPDIR=$(mktemp -d)
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir "$TMPDIR"

          # Read signatures
          read_sig() { cat "$TMPDIR/$1" 2>/dev/null || echo ""; }

          DARWIN_X64_SIG=$(read_sig "MSP.Studio_x64.app.tar.gz.sig")
          DARWIN_AARCH64_SIG=$(read_sig "MSP.Studio_aarch64.app.tar.gz.sig")
          LINUX_APPIMAGE_SIG=$(read_sig "MSP.Studio_${VERSION}_amd64.AppImage.sig")
          LINUX_DEB_SIG=$(read_sig "MSP.Studio_${VERSION}_amd64.deb.sig")
          LINUX_RPM_SIG=$(read_sig "MSP.Studio-${VERSION}-1.x86_64.rpm.sig")
          WINDOWS_MSI_SIG=$(read_sig "MSP.Studio_${VERSION}_x64_en-US.msi.sig")
          WINDOWS_NSIS_SIG=$(read_sig "MSP.Studio_${VERSION}_x64-setup.exe.sig")

          # Build latest.json using jq for proper escaping
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$RELEASE_BODY" \
            --arg pub_date "$PUB_DATE" \
            --arg darwin_x64_sig "$DARWIN_X64_SIG" \
            --arg darwin_x64_url "$DOWNLOAD_BASE/MSP.Studio_x64.app.tar.gz" \
            --arg darwin_aarch64_sig "$DARWIN_AARCH64_SIG" \
            --arg darwin_aarch64_url "$DOWNLOAD_BASE/MSP.Studio_aarch64.app.tar.gz" \
            --arg linux_sig "$LINUX_APPIMAGE_SIG" \
            --arg linux_url "$DOWNLOAD_BASE/MSP.Studio_${VERSION}_amd64.AppImage" \
            --arg linux_appimage_sig "$LINUX_APPIMAGE_SIG" \
            --arg linux_appimage_url "$DOWNLOAD_BASE/MSP.Studio_${VERSION}_amd64.AppImage" \
            --arg linux_deb_sig "$LINUX_DEB_SIG" \
            --arg linux_deb_url "$DOWNLOAD_BASE/MSP.Studio_${VERSION}_amd64.deb" \
            --arg linux_rpm_sig "$LINUX_RPM_SIG" \
            --arg linux_rpm_url "$DOWNLOAD_BASE/MSP.Studio-${VERSION}-1.x86_64.rpm" \
            --arg windows_sig "$WINDOWS_MSI_SIG" \
            --arg windows_url "$DOWNLOAD_BASE/MSP.Studio_${VERSION}_x64_en-US.msi" \
            --arg windows_msi_sig "$WINDOWS_MSI_SIG" \
            --arg windows_msi_url "$DOWNLOAD_BASE/MSP.Studio_${VERSION}_x64_en-US.msi" \
            --arg windows_nsis_sig "$WINDOWS_NSIS_SIG" \
            --arg windows_nsis_url "$DOWNLOAD_BASE/MSP.Studio_${VERSION}_x64-setup.exe" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64": { signature: $darwin_x64_sig, url: $darwin_x64_url },
                "darwin-x86_64-app": { signature: $darwin_x64_sig, url: $darwin_x64_url },
                "darwin-aarch64": { signature: $darwin_aarch64_sig, url: $darwin_aarch64_url },
                "darwin-aarch64-app": { signature: $darwin_aarch64_sig, url: $darwin_aarch64_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "linux-x86_64-appimage": { signature: $linux_appimage_sig, url: $linux_appimage_url },
                "linux-x86_64-deb": { signature: $linux_deb_sig, url: $linux_deb_url },
                "linux-x86_64-rpm": { signature: $linux_rpm_sig, url: $linux_rpm_url },
                "windows-x86_64": { signature: $windows_sig, url: $windows_url },
                "windows-x86_64-msi": { signature: $windows_msi_sig, url: $windows_msi_url },
                "windows-x86_64-nsis": { signature: $windows_nsis_sig, url: $windows_nsis_url }
              }
            }' > "$TMPDIR/latest.json"

          echo "Generated latest.json:"
          cat "$TMPDIR/latest.json" | jq '.platforms | keys'

          # Delete existing latest.json if present (from a partial upload)
          EXISTING_ASSET_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name == "latest.json") | .id')
          if [ -n "$EXISTING_ASSET_ID" ] && [ "$EXISTING_ASSET_ID" != "null" ]; then
            echo "Deleting existing latest.json (asset $EXISTING_ASSET_ID)..."
            gh api -X DELETE repos/$REPO/releases/assets/$EXISTING_ASSET_ID
          fi

          # Upload new latest.json
          gh release upload "$TAG" "$TMPDIR/latest.json" --repo "$REPO"
          echo "Uploaded latest.json successfully"

          rm -rf "$TMPDIR"
