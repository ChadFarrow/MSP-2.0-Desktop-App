name: Sync from Web Repo

on:
  repository_dispatch:
    types: [web-repo-updated]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/ChadFarrow/MSP-2.0.git || true
          git fetch upstream

      - name: Check for updates
        id: check
        run: |
          UPSTREAM_COMMITS=$(git rev-list master..upstream/master --count)
          echo "new_commits=$UPSTREAM_COMMITS" >> $GITHUB_OUTPUT

      - name: Merge upstream changes
        if: steps.check.outputs.new_commits != '0'
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git merge upstream/master --no-edit; then
            echo "conflicts=false" >> $GITHUB_OUTPUT
          else
            # Capture conflicting files before resolving
            CONFLICTING=$(git diff --name-only --diff-filter=U)
            echo "conflicting_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICTING" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "conflicts=true" >> $GITHUB_OUTPUT

            # Resolve conflicts by keeping our (desktop) version
            echo "$CONFLICTING" | xargs git checkout --ours --
            git add -A
            git -c core.editor=true merge --continue
          fi

      - name: Remove web-only workflows
        if: steps.check.outputs.new_commits != '0'
        run: |
          rm -f .github/workflows/notify-desktop.yml
          git add -A

      - name: Build PR body
        if: steps.check.outputs.new_commits != '0'
        id: pr_body
        env:
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
          CONFLICTING_FILES: ${{ steps.merge.outputs.conflicting_files }}
          NEW_COMMITS: ${{ steps.check.outputs.new_commits }}
        run: |
          {
            echo "body<<EOF"
            echo "Automated sync from [MSP-2.0 web repo](https://github.com/ChadFarrow/MSP-2.0)."
            echo ""
            echo "**New commits:** $NEW_COMMITS"
            echo ""
            if [ "$CONFLICTS" = "true" ]; then
              echo "⚠️ **Merge conflicts were auto-resolved (kept desktop version):**"
              echo "\`\`\`"
              echo "$CONFLICTING_FILES"
              echo "\`\`\`"
              echo "These files have desktop-specific changes. Review whether any upstream updates to these files need to be manually incorporated."
            else
              echo "✅ No merge conflicts."
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.new_commits != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SYNC_PAT }}
          title: "Sync updates from web repo"
          body: ${{ steps.pr_body.outputs.body }}
          branch: sync-upstream
          delete-branch: true
          labels: automated
